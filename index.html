<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ** Title and Logo -->
    <title>English Janala | Best Platform for Learning English</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon" />

    <!-- ** Font awesome  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- ** tailwind and daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- ** google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- ** stylesheet -->

    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <!-- ! navbar  -->
    <header>
      <div class="navbar bg-[#BADEFF]/26 shadow-sm justify-between px-10 md:px-15 lg:px-20 py-4">
        <div class="navbar-start">
          <div class="">
            <a class="flex items-center gap-1"
              ><span class="text-lg font-bold">English</span>
              <img src="assets/logo.png" alt="" /><span
                class="font-bangla font-semibold text-lg"
                >জানালা
              </span></a
            >
          </div>
        </div>
        <div class="dropdown dropdown-end">
          <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 20 20"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6h16M4 12h8m-8 6h16"
              />
            </svg>
          </div>
          <ul
            tabindex="-1"
            class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-40 md:items-center p-2 shadow"
          >
            <li>
              <a href=""><i class="fa-solid fa-circle-question"></i>FAQ</a>
            </li>
            <li>
              <a href=""><i class="fa-brands fa-leanpub"></i>Learn</a>
            </li>
            <li>
              <a href=""
                ><i class="fa-solid fa-arrow-right-from-bracket"></i>LogOut</a
              >
            </li>
          </ul>
        </div>
        <div class="navbar-end hidden lg:flex">
          <ul class="menu menu-horizontal px-1 gap-4">
            <li>
              <a href="" class="btn btn-primary btn-outline"
                ><i class="fa-solid fa-circle-question"></i>FAQ</a
              >
            </li>
            <li>
              <a href="" class="btn btn-primary btn-outline"
                ><i class="fa-brands fa-leanpub"></i>Learn</a
              >
            </li>
            <li>
              <a href="" class="btn btn-primary btn-outline"
                ><i class="fa-solid fa-arrow-right-from-bracket"></i>LogOut</a
              >
            </li>
          </ul>
        </div>
      </div>
    </header>

    <!-- ! banner section -->
     <section class="flex flex-col-reverse  md:flex-row justify-between items-center px-10 lg:px-20 md:px-15  pt-12">
        <div class="content text-center md:text-left">
            <h1 class="text-4xl md:text-6xl font-bold mb-6"><span class="text-sky-400">English </span><span>is Easy!!</span></h1>
            <p class="font-bangla text-xl mb-7">আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা <br> আপনার দক্ষতা বাড়াতে চান, আমাদের <span>Interactive Lessons</span> আপনাকে নিয়ে <br> যাবে অন্য একটি <span>Level</span> এ</p>

            <input class="border-neutral/30 p-3 w-80 rounded-md" type="text" placeholder="Enter Your Name"> <br> <br>
            <input class="border-neutral/30 p-3 w-80 rounded-md" type="password" name="" id="" placeholder="Enter Your Password"> <br><br>
            <button class="btn btn-primary">Get Started</button>
        </div>
        <div class="justify-end">
            <img src="./assets/hero-student.png" alt="">
        </div>
     </section>
  </body>
</html>
